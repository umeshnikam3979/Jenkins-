---
# Play 1: Localhost Database Backup
- hosts: localhost
  connection: local
  become: yes

  vars_files:
    - db_credentials.yml

  tasks:
    - name: Run backup script
      script: backup.sh
      environment:
        DB_USER: "{{ db_user }}"
        DB_PASS: "{{ db_password }}"
        DB_NAME: "{{ db_name }}"

# Play 2: EC2 Backup Copy
- hosts: web
  become: yes

  tasks:
    - name: Sync SQL backup files to EC2
      ansible.posix.synchronize:
        src: /var/lib/jenkins/workspace/database/
        dest: /home/ubuntu/sql/
        delete: no
        rsync_opts:
          - "--include=*.sql"
          - "--exclude=*"
